# .pages.yml — Pages CMS config for: team, services, work, infopages, posts
# Images live in src/images/{avatar,avatars,blog,work,...}

media:
  name: images
  label: Images
  input: src/images
  output: src/images
  path: ""                      # start the picker at /src/images
  extensions: [png, jpg, jpeg, webp, svg]

settings:
  content:
    merge: true

content:
  # ---------------------
  # TEAM
  # ---------------------
  - name: team
    label: Team
    type: collection
    path: src/content/team
    filename: "{primary}.md"
    view:
      primary: name
      fields: [name, role]
      sort: [name]
    fields:
      - { name: name,       label: Name, type: string, required: true }
      - { name: role,       label: Role, type: string }
      - { name: intro,      label: Intro, type: text }
      - name: education
        label: Education
        type: string
        list: true
      - name: experience
        label: Experience
        type: string
        list: true
      - name: socials
        label: Social Links
        type: object
        list: true
        fields:
          - { name: platform, label: Platform, type: string }
          - { name: url,      label: URL,      type: string }
      - name: avatar
        label: Avatar
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options: { media: images, path: avatar }   # src/images/avatar
          - { name: alt, label: Alt text, type: string }
      - { name: body, label: Body, type: rich-text }

  # ---------------------
  # SERVICES
  # ---------------------
  - name: services
    label: Services
    type: collection
    path: src/content/services
    filename: "{primary}.md"
    view:
      primary: service
      fields: [service]
      sort: [service]
    fields:
      - { name: service,     label: Service, type: string, required: true }
      - { name: description, label: Description, type: rich-text }
      - name: allServices
        label: Other Services
        type: object
        list: true
        fields:
          - { name: service,     label: Service,     type: string }
          - { name: description, label: Description, type: text }
      - name: testimonial
        label: Testimonial
        type: object
        fields:
          - { name: text,  label: Text,  type: text }
          # schema: { text: string, image: image() }
          - name: image
            label: Image
            type: image
            options: { media: images, path: avatars }  # src/images/avatars

  # ---------------------
  # WORK
  # ---------------------
  - name: work
    label: Work
    type: collection
    path: src/content/work
    filename: "{primary}.md"
    view:
      primary: title
      fields: [title, work, live]
      sort: [title]
    fields:
      - { name: work,        label: Work ID/slug, type: string, required: true }
      - { name: live,        label: Live URL,     type: string }
      - { name: title,       label: Title,        type: string }
      - { name: description, label: Description,  type: text }

      - name: intro
        label: Intro Blocks
        type: object
        list: true
        fields:
          - name: paragraphs
            label: Paragraphs
            type: string
            list: true

      - name: outro
        label: Outro Blocks
        type: object
        list: true
        fields:
          - name: paragraphs
            label: Paragraphs
            type: string
            list: true

      - name: projectData
        label: Project Data
        type: object
        list: true
        fields:
          - { name: client,  label: Client,  type: string }
          - { name: service, label: Service, type: string }
          - { name: sector,  label: Sector,  type: string }
          - { name: year,    label: Year,    type: string }

      - name: credits
        label: Credits
        type: object
        list: true
        fields:
          - { name: name, label: Name, type: string }
          - { name: role, label: Role, type: string }

      - name: images
        label: Gallery Images
        type: object
        list: true
        fields:
          - name: url
            label: Image
            type: image
            options: { media: images, path: work }        # src/images/work
          - { name: alt, label: Alt text, type: string }

      - name: thumbnail
        label: Thumbnail
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options: { media: images, path: work }        # src/images/work
          - { name: alt, label: Alt text, type: string }

      - { name: body, label: Body, type: rich-text }

  # ---------------------
  # INFO PAGES
  # ---------------------
  - name: infopages
    label: Info Pages
    type: collection
    path: src/content/infopages
    filename: "{primary}.md"
    view:
      primary: page
      fields: [page, pubDate]
      sort: [page]
    fields:
      - { name: page,    label: Page, type: string, required: true }
      - { name: pubDate, label: Publication Date, type: date }
      - { name: body,    label: Body, type: rich-text }

  # ---------------------
  # POSTS
  # ---------------------
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    filename: "{year}{month}{day}-{hour}{minute}{second}.md"
    view:
      primary: title
      fields: [title, pubDate, author]
      sort: [pubDate]
      default: { sort: pubDate, order: desc }
    fields:
      - { name: title,       label: Title, type: string, required: true }
      - { name: pubDate,     label: Publication Date, type: date }
      - { name: description, label: Description, type: text }
      - { name: author,      label: Author, type: string }
      - name: image
        label: Cover Image
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options: { media: images, path: blog }        # src/images/blog
          - { name: alt, label: Alt text, type: string }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: body, label: Body, type: rich-text }
